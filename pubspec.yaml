name: gharsip_app
description: Gharsip — Wear Your Vibe. Serve Your Style.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_messaging: ^15.0.4
  firebase_storage: ^12.1.3

  # UI & fonts
  google_fonts: ^6.2.1
  carousel_slider: ^5.0.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  cached_network_image: ^3.4.1

  # State management
  provider: ^6.1.2

  # Networking
  http: ^1.2.2

  # Device & utils
  image_picker: ^1.1.2
  url_launcher: ^6.3.0

  # Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  geolocator: ^13.0.0
  share_plus: ^10.0.0
  flutter_local_notifications: ^17.2.3
  intl: ^0.19.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
